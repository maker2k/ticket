<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Настройка проездного</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JPB0Z3S4Q2"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JPB0Z3S4Q2');</script>
</head>
<body>
    <div id="app">
        <div class="screen active">
            <div class="header">
                <h1>🎫 Настройка проездного</h1>
                <button id="btn-theme" class="btn-theme">🌙</button>
            </div>
            <div class="form-group">
                <label>Дата начала</label>
                <input type="date" id="start-date">
            </div>
            <div class="form-group">
                <label>Тип проездного</label>
                <div class="type-buttons">
                    <button class="type-btn selected" data-type="universal">Общий</button>
                    <button class="type-btn" data-type="ground">🚌 Наземный</button>
                    <button class="type-btn" data-type="metro">🚇 Метро</button>
                </div>
            </div>
            <div class="form-group">
                <label>Срок действия</label>
                <div class="duration-buttons">
                    <button class="duration-btn" data-days="10">10 дней</button>
                    <button class="duration-btn selected" data-days="20">20 дней</button>
                    <button class="duration-btn" data-days="30">30 дней</button>
                </div>
            </div>
            <div class="form-group" id="price-universal">
                <label>Стоимость общего проездного (BYN)</label>
                <input type="number" id="pass-price-universal" placeholder="Например, 2500 BYN" min="0.01" step="0.01">
            </div>
            <div class="form-group hidden" id="price-single">
                <label>Стоимость проездного на один вид транспорта (BYN)</label>
                <input type="number" id="pass-price-single" placeholder="Например, 1800 BYN" min="0.01" step="0.01">
            </div>
            <div class="form-group">
                <label>Цена за одну поездку (BYN)</label>
                <input type="number" id="trip-price" placeholder="Например, 46 BYN" min="0.01" step="0.01">
            </div>
            <button id="btn-start" class="btn-primary">Начать</button>

            <div class="card calc-card" id="plan-card">
                <div class="calc-summary" id="plan-header" onclick="document.getElementById('plan-dates').classList.toggle('hidden')">
                    <span>📅 Когда покупать?</span>
                    <span class="calc-expand">▾</span>
                </div>
                <div class="calc-details hidden" id="plan-dates"></div>
            </div>
        </div>
    </div>
    <script src="setup.js"></script>
</body>
</html>
