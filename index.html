<body>
    <div id="app">
        <div id="screen-track" class="screen active">
            <div class="header">
                <h1>📊 Учёт поездок</h1>
                <div class="header-buttons">
                    <button id="btn-theme" class="btn-theme">🌙</button>
                    <a href="help.html" class="btn-link">Справка</a>
                    <a href="setup.html" class="btn-link" onclick="return confirm('Текущий проездной и все поездки будут сброшены. Продолжить?')">Новый</a>
                </div>
            </div>

            <div id="pass-expired-banner" class="banner hidden">
                Проездной истёк!
            </div>

            <div id="pass-info" class="pass-info-line">
                <span id="pass-info-text"></span>
            </div>

            <div class="card days-card">
                <div class="days-info">
                    <span id="days-passed">0</span> / <span id="days-total">0</span> дней
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div id="days-remaining" class="days-remaining"></div>
            </div>

            <div id="trips-card" class="card trips-card">
                <div class="trips-today">
                    <span>Поездок за сегодня: <strong id="today-trips">0</strong></span>
                    <button id="btn-undo" class="btn-undo-inline hidden" onclick="if(confirm('Отменить последнюю поездку?'))this.dispatchEvent(new Event('undo'))">✖️</button>
                </div>
                <div class="trips-buttons">
                    <button id="btn-plus-ground" class="btn-trip-add" data-trip-type="ground">
                        🚌 Наземный
                    </button>
                    <button id="btn-plus-metro" class="btn-trip-add" data-trip-type="metro">
                        🚇 Метро
                    </button>
                </div>
                <div class="trips-total">
                    Всего: <strong id="total-trips">0</strong>
                    <span id="total-breakdown" class="total-breakdown"></span>
                </div>
            </div>

            <div class="card calc-card" id="calc-card">
                <div class="calc-summary" id="calc-summary">
                    <span id="calc-summary-text"></span>
                    <span class="calc-expand">▾</span>
                </div>
                <div class="calc-details hidden" id="calc-details">
                    <div class="calc-row">
                        <span>Стоимость проездного</span>
                        <span id="calc-pass-price">0 BYN</span>
                    </div>
                    <div class="calc-row">
                        <span>По розничным</span>
                        <span id="calc-retail-price">0 BYN</span>
                    </div>
                    <div class="calc-row result">
                        <span id="calc-result-label">Экономия</span>
                        <span id="calc-result-value">0 BYN</span>
                    </div>
                </div>
            </div>

            <div class="ad-block">
                <div id="yandex_rtb_R-A-19479210-1"></div>
            </div>
        </div>
    </div>

        });
